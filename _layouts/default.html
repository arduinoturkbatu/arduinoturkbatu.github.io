<!DOCTYPE html>
<html lang="en">

{% include head.html %}

<body> 
    <div class="cursor">
  <div class="cursor__ball cursor__ball--big ">
    <svg height="30" width="30">
      <circle cx="15" cy="15" r="12" stroke-width="0"></circle>
    </svg>
  </div>
  
  <div class="cursor__ball cursor__ball--small">
    <svg height="10" width="10">
      <circle cx="5" cy="5" r="4" stroke-width="0"></circle>
    </svg>
  </div>
</div>
    <div class="intro">
  <h1 class="load">Yükleniyor...</h1>
  <main>
	<svg class="ap" viewBox="0 0 128 256" width="128px" height="256px" xmlns="http://www.w3.org/2000/svg">
		<defs>
			<linearGradient id="ap-grad1" x1="0" y1="0" x2="0" y2="1">
				<stop offset="0%" stop-color="hsl(223,90%,55%)" />
				<stop offset="100%" stop-color="hsl(253,90%,55%)" />
			</linearGradient>
			<linearGradient id="ap-grad2" x1="0" y1="0" x2="0" y2="1">
				<stop offset="0%" stop-color="hsl(193,90%,55%)" />
				<stop offset="50%" stop-color="hsl(223,90%,55%)" />
				<stop offset="100%" stop-color="hsl(253,90%,55%)" />
			</linearGradient>
		</defs>
		<circle class="ap__ring" r="56" cx="64" cy="192" fill="none" stroke="#ddd" stroke-width="16" stroke-linecap="round" />
		<circle class="ap__worm1" r="56" cx="64" cy="192" fill="none" stroke="url(#ap-grad1)" stroke-width="16" stroke-linecap="round" stroke-dasharray="87.96 263.89" />
		<path class="ap__worm2" d="M120,192A56,56,0,0,1,8,192C8,161.07,16,8,64,8S120,161.07,120,192Z" fill="none" stroke="url(#ap-grad2)" stroke-width="16" stroke-linecap="round" stroke-dasharray="87.96 494" />
	</svg>
</main>
</div>
    <style>
        .intro {
            z-index: 50;
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100vh;
  background: #41228e;
  color: #fff;
  display: flex;
  justify-content: center;
}
.intro h1.load {
  font-size: 72px;
  margin-left: -100px;
}
main {
	padding: 1.5em 0;
}

.ap {
	width: 8em;
	height: 16em;
}
.ap__ring {
	stroke: hsla(223,10%,10%,0.15);
	transition: stroke 0.3s;
}
.ap__worm1,
.ap__worm2 {
	animation-duration: 3s;
	animation-iteration-count: infinite;
}
.ap__worm1 {
	animation-name: worm1;
}
.ap__worm2 {
	animation-name: worm2;
	visibility: hidden;
}

/* Dark theme */
@media (prefers-color-scheme: dark) {
	:root {
		--bg: hsl(223,10%,10%);
		--fg: hsl(223,10%,90%);
	}
	.ap__ring {
		stroke: hsla(223,10%,90%,0.1);
	}
}

/* Animtions */
@keyframes worm1 {
	from {
		animation-timing-function: ease-in-out;
		stroke-dashoffset: -87.96;
	}
	20% {
		animation-timing-function: ease-in;
		stroke-dashoffset: 0;
	}
	60% {
		stroke-dashoffset: -791.68;
		visibility: visible;
	}
	60.1%,
	to {
		stroke-dashoffset: -791.68;
		visibility: hidden;
	}
}
@keyframes worm2 {
	from,
	60% {
		stroke-dashoffset: -87.96;
		visibility: hidden;
	}
	60.1% {
		animation-timing-function: cubic-bezier(0,0,0.5,0.75);
		stroke-dashoffset: -87.96;
		visibility: visible;
	}
	77% {
		animation-timing-function: cubic-bezier(0.5,0.25,0.5,0.88);
		stroke-dashoffset: -340;
		visibility: visible;
	}
	to {
		stroke-dashoffset: -669.92;
		visibility: visible;
	}
}
.intro.remove {
  opacity: 0;
  display: none;
  pointer-events: none;
}
    </style>
    <script>
        document.onreadystatechange = () => {
  if (document.readyState === "complete") {
    document.querySelector(".intro").classList.add("remove");
  }
};

    </script>
  
  {% include header.html %}
  <div data-scroll-container>

    {{ content }}
  
    {% include contact-section.html %}
  
    {% include footer.html %}
  </div>
  
</body>

</html>
